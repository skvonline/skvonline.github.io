<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oops!</title>
  <style>
    :root {
      --bg-1: #07142b;
      --bg-2: #0d2f63;
      --bg-3: #154a96;
      --blue: #1f6fff;
      --blue-light: #62b3ff;
      --yellow: #ffd84d;
      --yellow-soft: #fff0a6;
      --white: #f8fbff;
      --glass: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.18);
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      --text-muted: rgba(248, 251, 255, 0.82);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      overflow: hidden;
      font-family: Inter, Arial, Helvetica, sans-serif;
      color: var(--white);
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 216, 77, 0.18), transparent 26%),
        radial-gradient(circle at 80% 20%, rgba(98, 179, 255, 0.18), transparent 28%),
        radial-gradient(circle at 50% 85%, rgba(31, 111, 255, 0.22), transparent 30%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2) 48%, var(--bg-3));
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 38px 38px;
      opacity: 0.45;
      animation: gridMove 12s linear infinite;
      pointer-events: none;
    }

    @keyframes gridMove {
      from { transform: translateY(0); }
      to { transform: translateY(38px); }
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(44px);
      opacity: 0.45;
      pointer-events: none;
      animation: floatOrb 9s ease-in-out infinite;
    }

    .orb.one {
      width: 260px;
      height: 260px;
      background: rgba(255, 216, 77, 0.9);
      top: 8%;
      left: 8%;
    }

    .orb.two {
      width: 300px;
      height: 300px;
      background: rgba(31, 111, 255, 0.9);
      bottom: 2%;
      right: 8%;
      animation-delay: 2s;
    }

    .orb.three {
      width: 180px;
      height: 180px;
      background: rgba(98, 179, 255, 0.85);
      top: 54%;
      left: 56%;
      animation-delay: 4s;
    }

    @keyframes floatOrb {
      0%, 100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(18px,-20px) scale(1.08); }
    }

    .wrapper {
      position: relative;
      z-index: 3;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      position: relative;
      width: min(980px, 100%);
      padding: 52px 36px 38px;
      border-radius: 30px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      overflow: hidden;
      text-align: center;
      animation: floatCard 5s ease-in-out infinite;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: inherit;
      padding: 2px;
      background: linear-gradient(
        135deg,
        rgba(255, 216, 77, 0.9),
        rgba(98, 179, 255, 0.95),
        rgba(255,255,255,0.7),
        rgba(31, 111, 255, 0.95)
      );
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.9;
    }

    @keyframes floatCard {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    .headline {
      position: relative;
      z-index: 2;
      margin: 0;
      font-size: clamp(4.8rem, 14vw, 9rem);
      line-height: 0.9;
      font-weight: 1000;
      letter-spacing: -0.05em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--yellow-soft), var(--yellow), #ffffff, var(--blue-light));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 30px rgba(255, 216, 77, 0.18);
      animation: pulseGlow 2.8s ease-in-out infinite;
    }

    @keyframes pulseGlow {
      0%, 100% { transform: scale(1); filter: brightness(1); }
      50% { transform: scale(1.025); filter: brightness(1.1); }
    }

    .subline {
      position: relative;
      z-index: 2;
      margin: 14px auto 0;
      max-width: 760px;
      font-size: clamp(1.1rem, 2.1vw, 1.55rem);
      font-weight: 800;
      color: var(--white);
    }

    .text {
      position: relative;
      z-index: 2;
      max-width: 720px;
      margin: 16px auto 26px;
      font-size: clamp(1rem, 1.7vw, 1.15rem);
      line-height: 1.7;
      color: var(--text-muted);
    }

    .actions {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 180px;
      padding: 14px 22px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 900;
      letter-spacing: 0.02em;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      overflow: hidden;
    }

    .btn:hover {
      transform: translateY(-3px) scale(1.03);
    }

    .btn-primary {
      color: #0b1d3d;
      background: linear-gradient(90deg, var(--yellow), var(--yellow-soft));
      box-shadow: 0 12px 28px rgba(255, 216, 77, 0.3);
    }

    .btn-secondary {
      color: var(--white);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 12px 28px rgba(98, 179, 255, 0.12);
    }

    .btn::after {
      content: "";
      position: absolute;
      top: 0;
      left: -120%;
      width: 70%;
      height: 100%;
      transform: skewX(-25deg);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent);
      transition: left 0.7s ease;
    }

    .btn:hover::after {
      left: 140%;
    }

    .stage {
      position: relative;
      width: min(820px, 100%);
      height: 250px;
      margin: 10px auto 8px;
      z-index: 1;
      pointer-events: none;
    }

    .floor {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: 86%;
      height: 44px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.28), rgba(255,255,255,0.04) 58%, transparent 76%);
      filter: blur(3px);
    }

    .spotlight {
      position: absolute;
      top: -30px;
      width: 210px;
      height: 290px;
      clip-path: polygon(46% 0%, 54% 0%, 100% 100%, 0% 100%);
      opacity: 0.22;
      filter: blur(2px);
      animation: sway 4.8s ease-in-out infinite;
    }

    .spotlight.left {
      left: 18%;
      background: linear-gradient(to bottom, rgba(255,255,255,0.7), rgba(255,216,77,0.18), transparent 88%);
      transform-origin: top center;
    }

    .spotlight.right {
      right: 18%;
      background: linear-gradient(to bottom, rgba(255,255,255,0.7), rgba(98,179,255,0.2), transparent 88%);
      transform-origin: top center;
      animation-delay: 1.4s;
    }

    @keyframes sway {
      0%, 100% { transform: rotate(-4deg); }
      50% { transform: rotate(4deg); }
    }

    .dancer {
      position: absolute;
      bottom: 38px;
      width: 76px;
      height: 150px;
      animation: dance 1.4s ease-in-out infinite;
      filter: drop-shadow(0 0 16px rgba(255,255,255,0.16));
    }

    .dancer.left {
      left: 31%;
    }

    .dancer.right {
      right: 31%;
      animation-delay: 0.7s;
    }

    @keyframes dance {
      0%, 100% { transform: translateY(0) rotate(-3deg) scale(1); }
      25% { transform: translateY(-8px) rotate(5deg) scale(1.02); }
      50% { transform: translateY(0) rotate(-2deg) scale(0.99); }
      75% { transform: translateY(-6px) rotate(4deg) scale(1.03); }
    }

    .head {
      position: absolute;
      top: 0;
      left: 50%;
      width: 22px;
      height: 22px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: linear-gradient(180deg, var(--white), #dfeeff);
      box-shadow: 0 0 14px rgba(255,255,255,0.25);
    }

    .body {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: 14px;
      height: 48px;
      border-radius: 10px;
      background: linear-gradient(180deg, var(--yellow), var(--blue-light));
    }

    .arm, .leg {
      position: absolute;
      background: linear-gradient(180deg, var(--white), rgba(255,255,255,0.8));
      border-radius: 10px;
      transform-origin: top center;
    }

    .arm {
      width: 7px;
      height: 42px;
      top: 30px;
    }

    .arm.left {
      left: 22px;
      transform: rotate(-46deg);
      animation: armLeft 1.2s ease-in-out infinite;
    }

    .arm.right {
      right: 22px;
      transform: rotate(48deg);
      animation: armRight 1.2s ease-in-out infinite;
    }

    .leg {
      width: 8px;
      height: 55px;
      top: 67px;
    }

    .leg.left {
      left: 26px;
      transform: rotate(18deg);
      animation: legLeft 1.2s ease-in-out infinite;
    }

    .leg.right {
      right: 26px;
      transform: rotate(-18deg);
      animation: legRight 1.2s ease-in-out infinite;
    }

    @keyframes armLeft {
      0%,100% { transform: rotate(-46deg); }
      50% { transform: rotate(-68deg); }
    }

    @keyframes armRight {
      0%,100% { transform: rotate(48deg); }
      50% { transform: rotate(68deg); }
    }

    @keyframes legLeft {
      0%,100% { transform: rotate(18deg); }
      50% { transform: rotate(35deg); }
    }

    @keyframes legRight {
      0%,100% { transform: rotate(-18deg); }
      50% { transform: rotate(-35deg); }
    }

    .confetti-front,
    .confetti-back {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .confetti-front { z-index: 6; }
    .confetti-back { z-index: 1; }

    .tiny-note {
      position: relative;
      z-index: 2;
      margin-top: 18px;
      font-size: 0.92rem;
      color: rgba(248, 251, 255, 0.62);
    }

    @media (max-width: 800px) {
      .stage {
        height: 210px;
      }

      .dancer.left { left: 24%; }
      .dancer.right { right: 24%; }

      .spotlight.left { left: 10%; }
      .spotlight.right { right: 10%; }
    }

    @media (max-width: 640px) {
      .card {
        padding: 34px 18px 30px;
        border-radius: 24px;
      }

      .stage {
        height: 180px;
      }

      .dancer {
        transform: scale(0.82);
      }

      .dancer.left { left: 16%; }
      .dancer.right { right: 16%; }

      .btn {
        width: 100%;
        max-width: 320px;
      }
    }
  </style>
</head>
<body>
  <div class="orb one"></div>
  <div class="orb two"></div>
  <div class="orb three"></div>

  <canvas class="confetti-back" id="confettiBack"></canvas>
  <canvas class="confetti-front" id="confettiFront"></canvas>

  <div class="wrapper">
    <div class="card">
      <h1 class="headline">Oops!</h1>

      <p class="subline">Diese Seite wurde wohl zu Konfetti verarbeitet</p>

      <div class="stage">
        <div class="spotlight left"></div>
        <div class="spotlight right"></div>

        <div class="dancer left">
          <div class="head"></div>
          <div class="body"></div>
          <div class="arm left"></div>
          <div class="arm right"></div>
          <div class="leg left"></div>
          <div class="leg right"></div>
        </div>

        <div class="dancer right">
          <div class="head"></div>
          <div class="body"></div>
          <div class="arm left"></div>
          <div class="arm right"></div>
          <div class="leg left"></div>
          <div class="leg right"></div>
        </div>

        <div class="floor"></div>
      </div>

      <p class="text">
        Offenbar ist die gesuchte Seite irgendwo zwischen Glitzer, Tanzfläche und digitalem Karneval verloren gegangen.
        Aber keine Sorge — mit einem Klick findest du schnell wieder zurück ins Getümmel.
      </p>

      <div class="actions">
        <a class="btn btn-primary" href="/">Zur Startseite</a>
        <a class="btn btn-secondary" href="javascript:history.back()">Zurück</a>
      </div>

      <div class="tiny-note">
        Konfetti-Alarm aktiviert.
      </div>
    </div>
  </div>

  <script>
    function setupConfetti(canvasId, count, speedMultiplier, sizeMultiplier, blurShadow) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');

      let width = canvas.width = window.innerWidth;
      let height = canvas.height = window.innerHeight;

      const colors = ['#ffd84d', '#fff6cc', '#62b3ff', '#1f6fff', '#ffffff'];
      const shapes = ['rect', 'circle', 'strip'];
      const pieces = [];

      function rand(min, max) {
        return Math.random() * (max - min) + min;
      }

      function createPiece() {
        return {
          x: rand(0, width),
          y: rand(-height, height),
          w: rand(5, 14) * sizeMultiplier,
          h: rand(8, 22) * sizeMultiplier,
          color: colors[Math.floor(Math.random() * colors.length)],
          speedY: rand(1.2, 4.2) * speedMultiplier,
          speedX: rand(-1.6, 1.6) * speedMultiplier,
          rotation: rand(0, Math.PI * 2),
          rotationSpeed: rand(-0.08, 0.08),
          shape: shapes[Math.floor(Math.random() * shapes.length)],
          sway: rand(0.5, 1.8),
        };
      }

      for (let i = 0; i < count; i++) {
        pieces.push(createPiece());
      }

      function draw(piece) {
        ctx.save();
        ctx.translate(piece.x, piece.y);
        ctx.rotate(piece.rotation);
        ctx.fillStyle = piece.color;
        ctx.shadowColor = piece.color;
        ctx.shadowBlur = blurShadow;

        if (piece.shape === 'rect') {
          ctx.fillRect(-piece.w / 2, -piece.h / 2, piece.w, piece.h);
        } else if (piece.shape === 'circle') {
          ctx.beginPath();
          ctx.arc(0, 0, piece.w / 2, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.fillRect(-piece.w / 6, -piece.h / 2, piece.w / 3, piece.h);
        }

        ctx.restore();
      }

      function update() {
        ctx.clearRect(0, 0, width, height);

        for (const piece of pieces) {
          piece.y += piece.speedY;
          piece.x += piece.speedX + Math.sin(piece.y * 0.01) * piece.sway;
          piece.rotation += piece.rotationSpeed;

          if (piece.y > height + 40) {
            piece.y = rand(-120, -20);
            piece.x = rand(0, width);
          }

          if (piece.x > width + 40) piece.x = -40;
          if (piece.x < -40) piece.x = width + 40;

          draw(piece);
        }

        requestAnimationFrame(update);
      }

      update();

      window.addEventListener('resize', () => {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      });
    }

    setupConfetti('confettiBack', 140, 0.9, 0.9, 6);
    setupConfetti('confettiFront', 220, 1.35, 1.25, 12);
  </script>
</body>
</html>
